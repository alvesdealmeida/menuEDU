<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="2;url=https://alvesdealmeida.github.io/educMenu1/">
<!--<meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
<title>🎓 Jogos Educacionais I</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff0080;
    --neon-yellow: #ffee00;
    --neon-green: #39ff14;
    --neon-purple: #bf00ff;
    --dark: #05050f;
    --dark2: #0a0a1f;
    --card-bg: rgba(255,255,255,0.03);
    --card-border: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    width: 16px; height: 16px;
    border: 2px solid var(--neon-cyan);
    position: fixed; border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.08s ease, background 0.2s;
    mix-blend-mode: difference;
  }
  .cursor.clicked { transform: translate(-50%,-50%) scale(2); background: var(--neon-cyan); }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none; z-index: 100;
    animation: scanMove 8s linear infinite;
  }
  @keyframes scanMove { from{background-position:0 0} to{background-position:0 100%} }

  /* Stars background */
  .stars {
    position: fixed; inset: 0; overflow: hidden; z-index: 0;
  }
  .star {
    position: absolute; background: #fff; border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }
  @keyframes twinkle {
    0%,100%{ opacity: 0.1; transform: scale(1); }
    50%{ opacity: 0.8; transform: scale(1.5); }
  }

  /* Grid glow lines */
  .grid-bg {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    perspective: 500px;
    animation: gridPulse 4s ease-in-out infinite;
  }
  @keyframes gridPulse {
    0%,100%{ opacity:0.5 } 50%{ opacity:1 }
  }

  /* Main layout */
  .container {
    position: relative; z-index: 10;
    max-width: 1100px; margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  header {
    text-align: center; margin-bottom: 60px;
    position: relative;
  }
  .logo-wrap {
    display: inline-block;
    position: relative;
  }
  .logo-icon {
    font-size: 3.5rem; display: block;
    animation: bounce 2s ease-in-out infinite;
    filter: drop-shadow(0 0 20px var(--neon-yellow));
  }
  @keyframes bounce {
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-10px); }
  }
  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    letter-spacing: 0.1em;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(0,245,255,0.5));
    animation: titleFlicker 5s ease-in-out infinite;
    margin-top: 12px;
  }
  @keyframes titleFlicker {
    0%,95%,100%{ opacity:1 }
    96%{ opacity:0.4 }
    97%{ opacity:1 }
    98%{ opacity:0.3 }
    99%{ opacity:1 }
  }
  .subtitle {
    font-size: 0.65rem;
    color: var(--neon-cyan);
    letter-spacing: 0.4em;
    margin-top: 10px;
    text-transform: uppercase;
    opacity: 0.7;
    font-family: 'Press Start 2P', monospace;
  }

  /* Score bar */
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(0,245,255,0.04);
    border: 1px solid rgba(0,245,255,0.15);
    border-radius: 6px; padding: 10px 20px;
    margin-bottom: 40px;
    font-size: 0.6rem; color: var(--neon-cyan);
    font-family: 'Press Start 2P', monospace;
    letter-spacing: 0.05em;
  }
  .blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Search */
  .search-wrap {
    margin-bottom: 36px; position: relative;
  }
  .search-wrap input {
    width: 100%; padding: 14px 20px 14px 50px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(0,245,255,0.25);
    border-radius: 6px; color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem; outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .search-wrap input:focus {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 20px rgba(0,245,255,0.2);
  }
  .search-wrap input::placeholder { color: rgba(255,255,255,0.25); }
  .search-icon {
    position: absolute; left: 16px; top: 50%;
    transform: translateY(-50%);
    color: var(--neon-cyan); font-size: 1.1rem;
  }

  /* Category tabs */
  .tabs {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 36px;
  }
  .tab {
    padding: 8px 18px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px; color: rgba(255,255,255,0.5);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem; font-weight: 700;
    cursor: none; letter-spacing: 0.1em;
    transition: all 0.25s;
    text-transform: uppercase;
  }
  .tab:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
  .tab.active {
    color: var(--dark);
    border-color: transparent;
    background: var(--neon-cyan);
    box-shadow: 0 0 16px rgba(0,245,255,0.5);
  }

  /* Games grid */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  /* Game card */
  .game-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    overflow: hidden;
    cursor: none;
    text-decoration: none;
    display: block;
    transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
    animation: cardIn 0.5s ease both;
    position: relative;
  }
  .game-card:hover {
    transform: translateY(-6px) scale(1.02);
    border-color: var(--accent-color, var(--neon-cyan));
    box-shadow: 0 10px 40px rgba(0,0,0,0.4),
                0 0 30px var(--accent-glow, rgba(0,245,255,0.2));
  }
  .game-card::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-thumb {
    height: 130px;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    position: relative; overflow: hidden;
    background: var(--thumb-bg, linear-gradient(135deg, #0a1628, #0d2040));
  }
  .card-thumb::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 50%, var(--accent-glow, rgba(0,245,255,0.15)), transparent 70%);
  }
  .card-thumb .emoji {
    position: relative; z-index: 1;
    animation: floatEmoji 3s ease-in-out infinite;
    filter: drop-shadow(0 0 12px var(--accent-color, var(--neon-cyan)));
  }
  @keyframes floatEmoji {
    0%,100%{ transform: translateY(0) rotate(-3deg); }
    50%{ transform: translateY(-8px) rotate(3deg); }
  }

  .card-badge {
    position: absolute; top: 10px; right: 10px;
    background: var(--accent-color, var(--neon-cyan));
    color: var(--dark); font-family: 'Press Start 2P', monospace;
    font-size: 0.45rem; padding: 4px 8px; border-radius: 3px;
    font-weight: 700; z-index: 2;
    letter-spacing: 0.05em;
  }

  .card-body { padding: 16px 18px 20px; }
  .card-title {
    font-size: 0.8rem; font-weight: 900;
    color: #fff; margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  .card-desc {
    font-size: 0.68rem; color: rgba(255,255,255,0.45);
    line-height: 1.6; margin-bottom: 14px;
    font-family: 'Orbitron', sans-serif;
  }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-tag {
    font-size: 0.55rem; font-family: 'Press Start 2P', monospace;
    color: var(--accent-color, var(--neon-cyan));
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .card-btn {
    background: transparent;
    border: 1px solid var(--accent-color, var(--neon-cyan));
    color: var(--accent-color, var(--neon-cyan));
    font-family: 'Press Start 2P', monospace;
    font-size: 0.5rem; padding: 7px 12px;
    border-radius: 4px; cursor: none;
    transition: all 0.2s; letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .card-btn:hover {
    background: var(--accent-color, var(--neon-cyan));
    color: var(--dark);
    box-shadow: 0 0 16px var(--accent-glow, rgba(0,245,255,0.4));
  }

  /* Empty state */
  .empty {
    grid-column: 1/-1; text-align: center;
    padding: 60px 20px; color: rgba(255,255,255,0.25);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.7rem; line-height: 2;
  }

  /* Footer */
  footer {
    text-align: center; margin-top: 70px;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.55rem; color: rgba(255,255,255,0.2);
    letter-spacing: 0.1em; position: relative; z-index: 10;
  }
  * ════════════════════════════════════
   MOBILE & TABLET — menuEDU
   ════════════════════════════════════ */

/* Link EduPlay na top-bar */
.edu-link {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,245,255,0.08);
  border: 1px solid rgba(0,245,255,0.3);
  border-radius: 4px;
  padding: 4px 12px;
  color: var(--neon-cyan);
  font-family: 'Press Start 2P', monospace;
  font-size: 0.5rem; 
  text-decoration: none;
  letter-spacing: 0.05em;
  transition: all 0.2s;
  white-space: nowrap;
  cursor: pointer;
}
.edu-link:hover {
  background: rgba(0,245,255,0.2);
  box-shadow: 0 0 14px rgba(0,245,255,0.3);
}

/* ── Tablet (até 900px) ────────────── */
@media (max-width: 900px) {
  .games-grid {
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
}

/* ── Celular (até 600px) ───────────── */
@media (max-width: 600px) {

  /* Cursor: volta ao padrão no touch */
  body  { cursor: auto; }
  .cursor { display: none; }          /* esconde cursor custom */
  .tab, .card-btn, .game-card { cursor: pointer; }

  /* Container */
  .container { padding: 24px 16px 60px; }

  /* Header menor */
  .logo-icon { font-size: 2.4rem; }
  h1         { font-size: clamp(1rem, 5vw, 1.4rem); }
  .subtitle  { font-size: 0.5rem; letter-spacing: 0.2em; }
  header    { margin-bottom: 32px; }

  /* Top bar: empilha verticalmente */
  .top-bar {
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 10px 14px;
    font-size: 0.5rem;
  }
  .top-bar-clock { display: none; }   /* esconde relógio no celular */
  .edu-link-text { display: inline; }  /* garante texto visível */

  /* Busca */
  .search-wrap { margin-bottom: 20px; }
  .search-wrap input {
    font-size: 0.75rem;
    padding: 12px 16px 12px 44px;
  }

  /* Abas: scroll horizontal */
  .tabs {
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
    margin-bottom: 24px;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 10px 16px;
    font-size: 0.6rem;
    touch-action: manipulation;
    cursor: pointer;
    min-height: 40px;   /* área de toque confortável */
  }

  /* Grid: 2 colunas */
  .games-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  /* Cards */
  .card-thumb { height: 100px; font-size: 2.6rem; }
  .card-body  { padding: 12px 14px 14px; }
  .card-title { font-size: 0.7rem; }
  .card-desc  {
    font-size: 0.58rem;
    -webkit-line-clamp: 2;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .card-btn {
    font-size: 0.42rem;
    padding: 8px 10px;
    min-height: 34px;
    touch-action: manipulation;
    cursor: pointer;
  }
  .card-tag   { font-size: 0.42rem; }
  .card-badge { font-size: 0.38rem; padding: 3px 6px; }

  /* Footer */
  footer { margin-top: 40px; }
}

/* ── Celular muito pequeno (até 360px): 1 coluna ── */
@media (max-width: 360px) {
  .games-grid { grid-template-columns: 1fr; }
  .card-thumb { height: 120px; }
}
.edu-link {
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, rgba(255, 238, 0, 0.15), rgba(0,0,0,0.4));
  border: 2px solid rgba(255, 238, 0, 0.7);
  border-radius: 10px;
  padding: 12px 20px;
  color: var(--neon-yellow);
  font-family: 'Press Start 2P', monospace;
  /* 🔥 AUMENTO REAL DO TEXTO */
  font-size: clamp(1.4rem, 2vw, 1.4rem);
  text-decoration: none;
  letter-spacing: 0.1em;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.25s ease;
  /* ✨ EFEITO NEON FORTE */
  text-shadow:
    0 0 5px var(--neon-yellow),
    0 0 10px var(--neon-yellow),
    0 0 20px var(--neon-yellow);

  box-shadow:
    0 0 10px rgba(255, 238, 0, 0.2),
    inset 0 0 10px rgba(255, 238, 0, 0.1);

  animation: pulse 2s ease-in-out infinite;
}

.edu-link:hover {
  transform: scale(1.08);
  background: rgba(255, 238, 0, 0.3);
  box-shadow:
    0 0 20px rgba(255, 238, 0, 0.7),
    0 0 40px rgba(255, 238, 0, 0.4);
  letter-spacing: 0.15em;
}

@keyframes pulse {
  0%,100% { box-shadow: 0 0 6px rgba(255,238,0,0.3); }
  50%      { box-shadow: 0 0 18px rgba(255,238,0,0.7); }
}
/* Compartilhamento */
.share-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 18px;
  padding: 14px 20px;
  background: rgba(0, 245, 255, 0.03);
  border: 1px solid rgba(0, 245, 255, 0.12);
  border-radius: 8px;
}

.share-bar-label {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.45rem;
  color: rgba(0, 245, 255, 0.5);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  white-space: nowrap;
}

.share-btn {
  width: 42px;
  height: 42px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.12);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
  transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.share-btn::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 42%;
  background: rgba(255,255,255,0.14);
  pointer-events: none;
  border-radius: inherit;
}
.share-btn:hover {
  transform: translateY(-4px) scale(1.1);
  filter: brightness(1.15);
}
.share-btn:active {
  transform: translateY(1px) scale(0.96);
}

/* Cores de cada rede */
.share-wa  { background: #25D366; box-shadow: 0 4px 0 #128C44, 0 0 12px rgba(37,211,102,0.3); }
.share-fb  { background: #1877F2; box-shadow: 0 4px 0 #0a5dc7, 0 0 12px rgba(24,119,242,0.3); }
.share-ig  { background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); box-shadow: 0 4px 0 #8c1060, 0 0 12px rgba(220,39,67,0.3); }
.share-copy { background: #2d333b; box-shadow: 0 4px 0 #111, 0 0 8px rgba(0,245,255,0.15); font-size: 16px; }
.share-wa:hover   { box-shadow: 0 7px 0 #128C44, 0 0 22px rgba(37,211,102,0.5); }
.share-fb:hover   { box-shadow: 0 7px 0 #0a5dc7, 0 0 22px rgba(24,119,242,0.5); }
.share-ig:hover   { box-shadow: 0 7px 0 #8c1060, 0 0 22px rgba(220,39,67,0.5); }
.share-copy:hover { box-shadow: 0 7px 0 #111,    0 0 20px rgba(0,245,255,0.3); }

/* Toast de "Copiado!" */
.share-toast {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  background: #161b22;
  border: 1px solid rgba(0,245,255,0.35);
  border-radius: 6px;
  padding: 8px 20px;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.5rem;
  color: var(--neon-cyan);
  letter-spacing: 0.08em;
  white-space: nowrap;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
  box-shadow: 0 0 20px rgba(0,245,255,0.2);
}
.share-toast.show { opacity: 1; }

/* Mobile: compacto */
@media (max-width: 480px) {
  .share-bar       { gap: 8px; padding: 10px 12px; margin-top: 14px; }
  .share-btn        { width: 38px; height: 38px; border-radius: 7px; }
  .share-bar-label  { display: none; }
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="stars" id="stars"></div>
<div class="grid-bg"></div>

<div class="container">
  <header>
    <div class="logo-wrap">
      <span class="logo-icon">🎓</span>
    </div>
    <h1>EDUC GAMES I</h1>
    <p class="subtitle">JOGOS EDUCACIONAIS &nbsp;▼</p>

  <!-- Share bar -->
  <div class="share-bar">

  <span class="share-bar-label">Compartilhar:</span>

  <!-- WhatsApp -->
  <button class="share-btn share-wa" title="WhatsApp"
          onclick="shareWA()" aria-label="Compartilhar no WhatsApp">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">

      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.117.553 4.103 1.523 5.824L0 24l6.338-1.499C8.014 23.459 9.966 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.869 0-3.638-.498-5.165-1.372l-.37-.22-3.83.906.957-3.702-.241-.382C2.508 15.636 2 13.876 2 12 2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z" fill="white"/>
    </svg>
  </button>

  <!-- Facebook -->
  <button class="share-btn share-fb" title="Facebook"
          onclick="shareFB()" aria-label="Compartilhar no Facebook">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
      <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
    </svg>
  </button>

  <!-- Instagram -->
  <button class="share-btn share-ig" title="Instagram"

// ── Helpers internos ──────────────────────────────────────────
function _copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).catch(function() {
      _fallbackCopy(text);
    });
  } else {
    _fallbackCopy(text);
  }
}

function _fallbackCopy(text) {
  var el = document.createElement('textarea');
  el.value = text;
  el.style.cssText = 'position:fixed;opacity:0;pointer-events:none;';
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
}

var _toastTimer = null;
function _showShareToast(msg) {
  var t = document.getElementById('share-toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() {
    t.classList.remove('show');
  }, 2800);
}

function getCategories() {
  const cats = ["Todos", "Matemática", "Lógica", "Português" ];
  return cats;
}
function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = getCategories().map(cat => `
    <button class="tab ${cat === activeCategory ? 'active' : ''}"
      onclick="setCategory('${cat}')">${cat}</button>
  `).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderTabs();
  filterGames();
}

function filterGames() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const filtered = games.filter(g => {
    const matchCat = activeCategory === "Todos" || g.category === activeCategory;
    const matchQ = !q || g.title.toLowerCase().includes(q) || g.desc.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  renderGames(filtered);
}

function renderGames(list) {
  const grid = document.getElementById("gamesGrid");
  if (!list.length) {
    grid.innerHTML = `<div class="empty">😵 NENHUM JOGO ENCONTRADO<br><br>TENTE OUTRO TERMO...</div>`;
    return;
  }
  grid.innerHTML = list.map((g, i) => `
    <a class="game-card" href="${g.url}" target="_blank" rel="noopener"
       style="--accent-color:${g.accent};--accent-glow:${g.glow};animation-delay:${i*0.07}s">
      <div class="card-thumb" style="background:${g.thumb}">
        <span class="emoji">${g.emoji}</span>
        ${g.badge ? `<span class="card-badge">${g.badge}</span>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${g.title}</div>
        <div class="card-desc">${g.desc}</div>
        <div class="card-footer">
          <span class="card-tag">${g.category}</span>
          <button class="card-btn">▶ JOGAR</button>
        </div>
      </div>
    </a>
  `).join('');
}

// Stars
function createStars() {
  const wrap = document.getElementById("stars");
  for (let i = 0; i < 120; i++) {
    const s = document.createElement("div");
    const size = Math.random() * 2.5 + 0.5;
    s.className = "star";
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      --dur:${2+Math.random()*4}s; --delay:${Math.random()*5}s;
    `;
    wrap.appendChild(s);
  }
}

// Cursor — só ativa em dispositivos com mouse (não touch)
const cursor = document.getElementById("cursor");
const isTouch = navigator.maxTouchPoints > 0 || 'ontouchstart' in window;
if (!isTouch) {
  document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top  = e.clientY + "px";
  });
  document.addEventListener("mousedown", () => cursor.classList.add("clicked"));
  document.addEventListener("mouseup",   () => cursor.classList.remove("clicked"));
} else {
  cursor.style.display = "none"; // esconde cursor no celular/tablet
  document.body.style.cursor = "auto";
}

// Clock
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById("clock").textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}
